<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Garrett Leber{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/kanagawa.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}">
</head>
<body>
    <nav class="nav">
        <a class="nav-brand" href="{{ url_for('main.home') }}">garrettleber.com</a>
        <div class="nav-links">
            <a href="{{ url_for('main.home') }}"{% if request.path == '/' %} class="active"{% endif %}>~/</a>
            <a href="{{ url_for('main.blog_list') }}"{% if request.path.startswith('/blog') %} class="active"{% endif %}>~/blog</a>
        </div>
    </nav>

    <div class="terminal-window">
        <div class="terminal-titlebar">
            <div class="terminal-dots">
                <span class="terminal-dot terminal-dot-red"></span>
                <span class="terminal-dot terminal-dot-yellow"></span>
                <span class="terminal-dot terminal-dot-green"></span>
            </div>
            <span class="terminal-path">garrett@garrettleber:{% block terminal_path %}~{% endblock %}</span>
        </div>
        <main class="container">
            {% block content %}{% endblock %}
        </main>
        <div class="tmux-bar">
            <span class="tmux-session">garrett</span>
            <span class="tmux-sep"> </span>
            <a class="tmux-win" href="https://github.com/tcpkump/nixCats-config" target="_blank" rel="noopener">1:nvim</a>
            <a class="tmux-win tmux-win-active" href="https://github.com/tcpkump/garrettleber.com" target="_blank" rel="noopener">2:garrettleber.com*</a>
            <a class="tmux-win" href="https://github.com/tcpkump/fluxcd-demo" target="_blank" rel="noopener">3:k9s</a>
            <a class="tmux-win" href="https://github.com/tcpkump/tf-live" target="_blank" rel="noopener">4:terraform</a>
            <a class="tmux-win" href="https://github.com/tcpkump/nix-base" target="_blank" rel="noopener">5:nix</a>
        </div>
    </div>

    {% block scripts %}{% endblock %}
    <footer class="footer">
        <a href="https://github.com/tcpkump">github.com/tcpkump</a>
    </footer>
</body>
</html>
